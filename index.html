<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="BxB Inkoop">
<meta name="theme-color" content="#f5f4f1">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>BxB Inkoop</title>
<style>
:root {
  --bg: #f5f4f1;
  --surface: #ffffff;
  --border: rgba(0,0,0,0.06);
  --border-heavy: rgba(0,0,0,0.1);
  --text-1: #1a1a1a;
  --text-2: #999;
  --text-3: #bbb;
  --text-4: #ddd;
  --green-bg: #e8f2ec;
  --green-text: #3d7a5a;
  --warm-bg: #eeecea;
  --radius: 16px;
  --radius-sm: 12px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text-1);
  min-height: 100vh;
  overflow-x: hidden;
  padding-top: var(--safe-top);
  padding-bottom: calc(64px + var(--safe-bottom));
}

.header {
  position: sticky; top: 0; z-index: 100;
  background: var(--surface);
  padding: 14px 20px 12px;
  padding-top: calc(14px + var(--safe-top));
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.header-logo { height: 14px; width: auto; opacity: 0.25; }
.header-title { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
.header-left { display: flex; align-items: center; gap: 10px; }
.header-date { font-size: 13px; color: var(--text-3); }

.tab-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex; justify-content: space-around; align-items: center;
  padding: 6px 0 calc(6px + var(--safe-bottom));
}
.tab-item {
  position: relative;
  display: flex; flex-direction: column; align-items: center;
  gap: 2px; padding: 6px 20px; border: none; background: none;
  color: var(--text-3); font-family: inherit; font-size: 10px;
  font-weight: 500; cursor: pointer; transition: color 0.2s;
}
.tab-item.active { color: var(--text-1); }
.tab-item svg { width: 22px; height: 22px; }
.tab-badge {
  position: absolute; top: 0; right: 8px;
  background: var(--text-1); color: var(--surface);
  font-size: 9px; font-weight: 700;
  min-width: 15px; height: 15px; line-height: 15px;
  border-radius: 8px; text-align: center; padding: 0 4px;
}

.page { display: none; padding: 14px 12px 20px; }
.page.active { display: block; }

.section-label {
  font-size: 11px; font-weight: 600; color: var(--text-3);
  letter-spacing: 0.8px; text-transform: uppercase;
  padding: 8px 8px 6px;
}

.filter-row {
  display: flex; gap: 6px; overflow-x: auto; padding: 4px 4px 12px;
  -webkit-overflow-scrolling: touch; scrollbar-width: none;
}
.filter-row::-webkit-scrollbar { display: none; }
.filter-pill {
  flex-shrink: 0; padding: 6px 14px; border-radius: 100px;
  border: none; background: none;
  color: var(--text-2); font-family: inherit; font-size: 13px;
  font-weight: 500; cursor: pointer; transition: all 0.15s;
}
.filter-pill.active { background: var(--text-1); color: var(--surface); }

/* Cards */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  overflow: hidden;
  margin-bottom: 8px;
}
.card.expanded .card-details { display: block; }
.card.status-bewaard { border-color: rgba(61,122,90,0.2); }
.card.status-niet { opacity: 0.4; }
.card.status-ingekocht { border-color: rgba(61,122,90,0.3); }

.card-main {
  display: flex; gap: 14px; padding: 16px;
}
.card-thumb {
  width: 56px; height: 56px; border-radius: var(--radius-sm);
  background: var(--warm-bg); flex-shrink: 0;
  object-fit: cover;
}
.card-thumb-sm {
  width: 44px; height: 44px; border-radius: 10px;
  background: var(--warm-bg); flex-shrink: 0;
  object-fit: cover;
}
.card-content { flex: 1; min-width: 0; }
.card-top { display: flex; justify-content: space-between; align-items: baseline; }
.card-title { font-size: 15px; font-weight: 600; color: var(--text-1); }
.card-title-sm { font-size: 14px; font-weight: 600; color: var(--text-1); }
.card-score { font-size: 12px; font-weight: 600; color: var(--text-4); }
.card-meta { font-size: 13px; color: var(--text-2); margin-top: 2px; }
.card-meta-sm { font-size: 12px; color: var(--text-3); margin-top: 1px; }

.card-marge-row { display: flex; justify-content: space-between; align-items: baseline; margin-top: 12px; }
.card-marge-row-sm { display: flex; justify-content: space-between; align-items: baseline; margin-top: 8px; }
.card-marge { font-size: 24px; font-weight: 600; color: var(--text-1); letter-spacing: -0.5px; }
.card-marge-sm { font-size: 18px; font-weight: 600; color: var(--text-1); }
.card-pct {
  font-size: 12px; font-weight: 600; color: var(--green-text);
  background: var(--green-bg); padding: 3px 10px; border-radius: 100px;
}
.card-pct-sm {
  font-size: 11px; font-weight: 600; color: var(--green-text);
  background: var(--green-bg); padding: 2px 8px; border-radius: 100px;
}
.card-prices { font-size: 12px; color: var(--text-4); margin-top: 6px; }
.card-status-label {
  font-size: 11px; font-weight: 600; color: var(--green-text);
  background: var(--green-bg); padding: 2px 8px; border-radius: 6px;
  margin-left: 6px;
}

/* Card actions */
.card-actions {
  display: flex; border-top: 1px solid var(--border);
}
.card-actions a, .card-actions button {
  flex: 1; padding: 13px; border: none; background: none;
  font-family: inherit; font-size: 13px; font-weight: 500;
  cursor: pointer; display: flex; align-items: center;
  justify-content: center; gap: 5px; text-decoration: none;
  transition: background 0.15s;
}
.card-actions a:active, .card-actions button:active { background: rgba(0,0,0,0.02); }
.card-actions > *:not(:last-child) { border-right: 1px solid var(--border); }
.act-primary { color: var(--text-1); }
.act-secondary { color: var(--text-2); }
.act-dim { color: var(--text-4); }
.card-actions svg { width: 14px; height: 14px; }

/* Expand */
.card-expand {
  display: flex; align-items: center; justify-content: center;
  gap: 5px; width: 100%; padding: 10px;
  border: none; background: none; border-top: 1px solid var(--border);
  color: var(--text-3); font-family: inherit; font-size: 12px;
  font-weight: 500; cursor: pointer;
}
.card-expand svg { width: 14px; height: 14px; transition: transform 0.3s; }
.card.expanded .card-expand svg { transform: rotate(180deg); }

/* Details */
.card-details { display: none; padding: 0 16px 16px; }
.detail-section { margin-bottom: 14px; }
.detail-label { font-size: 11px; color: var(--text-3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.detail-text { font-size: 14px; color: var(--text-2); line-height: 1.5; }
.feature-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.feature-tag { font-size: 12px; padding: 4px 10px; background: var(--bg); border-radius: 100px; color: var(--text-2); font-weight: 500; }
.calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); border-radius: 10px; overflow: hidden; }
.calc-item { padding: 8px 12px; background: var(--surface); }
.calc-key { font-size: 11px; color: var(--text-3); }
.calc-val { font-size: 14px; font-weight: 600; margin-top: 1px; }
.calc-val.accent { color: var(--green-text); }
.atx-placeholder { margin: 8px 16px 0; padding: 8px 12px; background: #eef4ff; border-radius: 10px; font-size: 12px; color: #4a7ab5; text-align: center; }

/* Watchlist */
.watch-card {
  background: var(--surface); border-radius: var(--radius);
  border: 1px solid var(--border); overflow: hidden; margin-bottom: 8px;
}
.watch-card.expanded .card-details { display: block; }
.watch-card.is-bought { border-color: rgba(61,122,90,0.2); }
.watch-main { display: flex; gap: 12px; padding: 14px; }
.watch-info { flex: 1; min-width: 0; }
.watch-title { font-size: 14px; font-weight: 600; }
.watch-meta { font-size: 12px; color: var(--text-3); margin-top: 2px; }
.watch-days { font-size: 11px; color: var(--text-4); margin-top: 1px; }
.watch-marge { flex-shrink: 0; text-align: right; }
.watch-marge-val { font-size: 15px; font-weight: 600; }
.watch-marge-pct { font-size: 11px; color: var(--text-3); }
.watch-actions { display: flex; border-top: 1px solid var(--border); }
.watch-actions button {
  flex: 1; padding: 12px; border: none; background: none;
  font-family: inherit; font-size: 13px; font-weight: 500;
  cursor: pointer; display: flex; align-items: center;
  justify-content: center; gap: 5px;
}
.watch-actions button:active { background: rgba(0,0,0,0.02); }
.watch-actions > *:not(:last-child) { border-right: 1px solid var(--border); }
.btn-ingekocht { color: var(--green-text); }
.btn-verwijder { color: var(--text-3); }

/* Dashboard */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.stat-card { background: var(--surface); border-radius: var(--radius-sm); border: 1px solid var(--border); padding: 16px; }
.stat-value { font-size: 26px; font-weight: 600; letter-spacing: -0.5px; margin-bottom: 2px; }
.stat-label { font-size: 12px; color: var(--text-3); font-weight: 500; }
.model-card { background: var(--surface); border-radius: var(--radius-sm); border: 1px solid var(--border); padding: 14px; margin-bottom: 6px; }
.model-row { display: flex; justify-content: space-between; align-items: baseline; }
.model-name { font-size: 14px; font-weight: 600; }
.model-stat { font-size: 12px; color: var(--text-3); }
.model-bar-wrap { height: 4px; background: var(--bg); border-radius: 2px; overflow: hidden; margin-top: 8px; }
.model-bar { height: 100%; border-radius: 2px; background: var(--text-4); transition: width 0.6s; }

/* Footer logo */
.footer-logo { text-align: center; padding: 24px 40px 8px; opacity: 0.12; }
.footer-logo img { height: 50px; width: auto; }

/* Empty state */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-3); }
.empty-state svg { width: 40px; height: 40px; margin-bottom: 10px; opacity: 0.3; }
.empty-state p { font-size: 14px; }

/* Animations */
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.card, .watch-card { animation: fadeIn 0.3s ease both; }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <img src="./logo.svg" alt="" class="header-logo">
    <span class="header-title">Inkoop</span>
  </div>
  <span class="header-date" id="headerDate"></span>
</header>

<div class="page active" id="pageDag">
  <div class="filter-row" id="filterRow"></div>
  <div id="cardsContainer"></div>
</div>

<div class="page" id="pageWatch">
  <div style="display:flex;align-items:baseline;justify-content:space-between;padding:4px 8px 8px;">
    <span style="font-size:15px;font-weight:600;">Watchlist</span>
    <span style="font-size:12px;color:var(--text-3);" id="watchCount"></span>
  </div>
  <div class="filter-row" id="watchFilter"></div>
  <div id="watchList"></div>
</div>

<div class="page" id="pageDash">
  <div style="padding:4px 8px 12px;"><span style="font-size:15px;font-weight:600;">Overzicht</span></div>
  <div class="stats-grid" id="statsGrid"></div>
  <div style="padding:8px 8px 8px;"><span style="font-size:15px;font-weight:600;">Per model</span></div>
  <div id="modelStats"></div>
  <div class="footer-logo"><img src="./logo.svg" alt="Bossen & de Bakker"></div>
</div>

<nav class="tab-bar">
  <button class="tab-item active" data-page="pageDag">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
    Vandaag
  </button>
  <button class="tab-item" data-page="pageWatch" id="tabWatch">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    Watchlist
  </button>
  <button class="tab-item" data-page="pageDash">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
    Dashboard
  </button>
</nav>

<script>
let appData = null;
let decisions = {};
let activeFilter = 'alle';
let watchFilterVal = 'alle';

try { decisions = JSON.parse(localStorage.getItem('bxb_decisions') || '{}'); } catch(e) {}
function saveDecisions() { localStorage.setItem('bxb_decisions', JSON.stringify(decisions)); }

function eur(n) { return n == null ? '-' : new Intl.NumberFormat('nl-NL',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n); }
function pct(n) { return '+' + n + '%'; }
function dot(n) { return new Intl.NumberFormat('nl-NL').format(n); }
function fmtDate(d) {
  const m=['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
  const w=['zo','ma','di','wo','do','vr','za'];
  const dt=new Date(d+'T00:00:00');
  return w[dt.getDay()]+' '+dt.getDate()+' '+m[dt.getMonth()];
}
function shortDate(d) { const dt=new Date(d+'T00:00:00'); return dt.getDate()+'-'+(dt.getMonth()+1)+'-'+dt.getFullYear(); }
function daysAgo(s) { return s ? Math.floor((Date.now()-new Date(s).getTime())/864e5) : 0; }
function mobileUrl(a) { return a.url || 'https://suchen.mobile.de/fahrzeug-details.html?id='+a.vehicleId; }

// Tabs
document.querySelectorAll('.tab-item').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.tab-item').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById(b.dataset.page).classList.add('active');
  });
});

function updateBadge() {
  const n = Object.values(decisions).filter(d => d.status==='bewaard').length;
  const tab = document.getElementById('tabWatch');
  const ex = tab.querySelector('.tab-badge');
  if (ex) ex.remove();
  if (n > 0) tab.insertAdjacentHTML('beforeend', '<span class="tab-badge">'+n+'</span>');
}

// Details HTML
function detailsHTML(a) {
  return '<div class="card-details"><div class="detail-section"><div class="detail-label">Waarom deze auto?</div><div class="detail-text">'+a.reasoning+'</div></div><div class="detail-section"><div class="detail-label">Uitrusting</div><div class="feature-tags">'+(a.features||[]).map(f=>'<span class="feature-tag">'+f+'</span>').join('')+'</div></div><div class="detail-section"><div class="detail-label">Berekening</div><div class="calc-grid"><div class="calc-item"><div class="calc-key">DE bruto (incl. 19% MwSt)</div><div class="calc-val">'+eur(a.price_de_bruto)+'</div></div><div class="calc-item"><div class="calc-key">DE netto</div><div class="calc-val">'+eur(a.price_de_netto)+'</div></div><div class="calc-item"><div class="calc-key">BPM ('+a.bpm_co2+' g/km)</div><div class="calc-val">'+eur(a.bpm)+' <span style="font-size:11px;color:var(--text-3)">'+a.bpm_source+'</span></div></div><div class="calc-item"><div class="calc-key">Transport</div><div class="calc-val">'+eur(a.transport)+'</div></div><div class="calc-item"><div class="calc-key">Marge '+a.margin_pct+'%</div><div class="calc-val accent">'+eur(a.margin_eur)+'</div></div><div class="calc-item"><div class="calc-key">NL verkoop (incl. 21% BTW)</div><div class="calc-val accent">'+eur(a.nl_sale_price)+'</div></div></div></div></div>';
}

// Actions
function bewaar(id,model,title,img,url,price,margin,mpct,nlp) {
  decisions[id]={status:'bewaard',model,title,image:img,url,price,margin,margin_pct:mpct,nlPrice:nlp,date:appData.date,savedAt:new Date().toISOString()};
  saveDecisions(); renderAll();
}
function dismiss(id,model,title,img,url,price,margin,mpct,nlp) {
  decisions[id]={status:'niet',model,title,image:img,url,price,margin,margin_pct:mpct,nlPrice:nlp,date:appData.date,decidedAt:new Date().toISOString()};
  saveDecisions(); renderAll();
}
function markBought(id) {
  if(decisions[id]){decisions[id].status='ingekocht';decisions[id].boughtAt=new Date().toISOString();saveDecisions();renderAll();}
}
function removeWatch(id) {
  if(decisions[id]){decisions[id].status='niet';decisions[id].decidedAt=new Date().toISOString();saveDecisions();renderAll();}
}
function toggle(id) {
  const c=document.querySelector('[data-id="'+id+'"]');
  if(c)c.classList.toggle('expanded');
}

// Render card
function renderCard(a, rank, model, isFirst) {
  const id=a.vehicleId, st=decisions[id]?.status||null;
  const sc=st?'status-'+st:'';
  const sl=st==='bewaard'?'<span class="card-status-label">Watchlist</span>':st==='ingekocht'?'<span class="card-status-label">Ingekocht</span>':'';
  const safe=a.title.replace(/'/g,"\\'"), sUrl=mobileUrl(a).replace(/'/g,"\\'"), sImg=(a.image||'').replace(/'/g,"\\'");
  const args="'"+id+"','"+model+"','"+safe+"','"+sImg+"','"+sUrl+"',"+a.price_de_bruto+","+a.margin_eur+","+a.margin_pct+","+a.nl_sale_price;
  const thumb=isFirst?'card-thumb':'card-thumb-sm';
  const titleCls=isFirst?'card-title':'card-title-sm';
  const metaCls=isFirst?'card-meta':'card-meta-sm';
  const margeRow=isFirst?'card-marge-row':'card-marge-row-sm';
  const margeCls=isFirst?'card-marge':'card-marge-sm';
  const pctCls=isFirst?'card-pct':'card-pct-sm';
  const atx=(a.autotelex_internet==null&&isFirst)?'<div class="atx-placeholder">Autotelex waarde beschikbaar zodra VehicleData API actief is</div>':'';

  let html='<div class="card '+sc+'" data-id="'+id+'">';
  html+='<div class="card-main">';
  html+='<img class="'+thumb+'" src="'+(a.image||'')+'" alt="" loading="lazy" onerror="this.style.display=\'none\'">';
  html+='<div class="card-content">';
  html+='<div class="card-top"><span class="'+titleCls+'">'+a.title.replace('Mercedes-Benz ','')+sl+'</span><span class="card-score">'+a.quality_score+'</span></div>';
  html+='<div class="'+metaCls+'">'+a.year+' &middot; '+dot(a.km)+' km &middot; '+a.color_nl+'</div>';
  html+='<div class="'+margeRow+'"><span class="'+margeCls+'">'+eur(a.margin_eur)+'</span><span class="'+pctCls+'">'+pct(a.margin_pct)+'</span></div>';
  if(isFirst) html+='<div class="card-prices">'+dot(a.price_de_bruto)+' <span style="color:var(--text-4)">&rarr;</span> '+dot(a.nl_sale_price)+'</div>';
  html+='</div></div>';
  html+=atx;

  if(!st) {
    html+='<div class="card-actions">';
    html+='<button class="act-primary" onclick="bewaar('+args+')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>Bewaren</button>';
    html+='<a class="act-secondary" href="'+mobileUrl(a)+'" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>mobile.de</a>';
    html+='<button class="act-dim" onclick="dismiss('+args+')">Niet</button>';
    html+='</div>';
  } else {
    html+='<a style="display:flex;align-items:center;justify-content:center;gap:5px;padding:10px;border-top:1px solid var(--border);color:var(--text-2);font-size:12px;font-weight:500;text-decoration:none;" href="'+mobileUrl(a)+'" target="_blank" rel="noopener"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>mobile.de</a>';
  }

  if(isFirst) {
    html+='<button class="card-expand" onclick="toggle(\''+id+'\')"><span>Details</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></button>';
    html+=detailsHTML(a);
  }

  html+='</div>';
  return html;
}

// Render Vandaag
function renderToday() {
  if(!appData) return;
  document.getElementById('headerDate').textContent=fmtDate(appData.date);
  const models=['alle',...appData.models.map(m=>m.model)];
  document.getElementById('filterRow').innerHTML=models.map(m=>'<button class="filter-pill '+(m===activeFilter?'active':'')+'" onclick="setFilter(\''+m+'\')">'+(m==='alle'?'Alle':m.replace('-Klasse',''))+'</button>').join('');
  let h='';
  const filtered=activeFilter==='alle'?appData.models:appData.models.filter(m=>m.model===activeFilter);
  filtered.forEach(g => {
    if(!g.top.length) return;
    h+='<div class="section-label">'+g.model.replace('-Klasse','')+'</div>';
    g.top.forEach((a,i) => { h+=renderCard(a, i+1, g.model, i===0); });
  });
  document.getElementById('cardsContainer').innerHTML=h;
}
function setFilter(f) { activeFilter=f; renderToday(); }

// Render Watchlist
function renderWatchlist() {
  const all=Object.entries(decisions).filter(([_,d])=>d.status==='bewaard'||d.status==='ingekocht').map(([id,d])=>({id,...d})).sort((a,b)=>new Date(b.savedAt||b.boughtAt)-new Date(a.savedAt||a.boughtAt));
  const bew=all.filter(d=>d.status==='bewaard'), ink=all.filter(d=>d.status==='ingekocht');
  document.getElementById('watchCount').textContent=bew.length+' bewaard, '+ink.length+' ingekocht';
  const filters=['alle','bewaard','ingekocht'];
  document.getElementById('watchFilter').innerHTML=filters.map(f=>'<button class="filter-pill '+(f===watchFilterVal?'active':'')+'" onclick="setWatchFilter(\''+f+'\')">'+(f==='alle'?'Alles':f==='bewaard'?'Watchlist':'Ingekocht')+'</button>').join('');
  const filt=watchFilterVal==='alle'?all:all.filter(d=>d.status===watchFilterVal);
  if(!filt.length) {
    document.getElementById('watchList').innerHTML='<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><p>Nog geen auto\'s bewaard</p></div>';
    return;
  }
  document.getElementById('watchList').innerHTML=filt.map(d => {
    const days=daysAgo(d.savedAt), dl=days===0?'vandaag':days===1?'gisteren':days+' dagen geleden';
    const bought=d.status==='ingekocht';
    let auto=null;
    if(appData?.models) for(const m of appData.models){const f=m.top.find(a=>a.vehicleId===d.id);if(f){auto=f;break;}}
    let h='<div class="watch-card'+(bought?' is-bought':'')+'" data-id="'+d.id+'">';
    h+='<div class="watch-main">';
    if(d.image) h+='<img class="card-thumb-sm" src="'+d.image+'" alt="" loading="lazy" onerror="this.style.display=\'none\'">';
    h+='<div class="watch-info"><div class="watch-title">'+d.title.replace('Mercedes-Benz ','')+(bought?'<span class="card-status-label">Ingekocht</span>':'')+'</div><div class="watch-meta">'+d.model+' &middot; '+shortDate(d.date)+'</div><div class="watch-days">Bewaard '+dl+'</div></div>';
    h+='<div class="watch-marge"><div class="watch-marge-val">'+eur(d.margin)+'</div><div class="watch-marge-pct">'+pct(d.margin_pct)+'</div></div>';
    h+='</div>';
    h+='<a style="display:flex;align-items:center;justify-content:center;gap:5px;padding:10px;border-top:1px solid var(--border);color:var(--text-2);font-size:12px;font-weight:500;text-decoration:none;" href="'+(d.url||'https://suchen.mobile.de/fahrzeug-details.html?id='+d.id)+'" target="_blank" rel="noopener"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>Bekijk op mobile.de</a>';
    if(auto){h+='<button class="card-expand" onclick="toggle(\''+d.id+'\')"><span>Details</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></button>';h+=detailsHTML(auto);}
    if(!bought){h+='<div class="watch-actions"><button class="btn-ingekocht" onclick="markBought(\''+d.id+'\')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>Ingekocht</button><button class="btn-verwijder" onclick="removeWatch(\''+d.id+'\')">Verwijderen</button></div>';}
    h+='</div>';
    return h;
  }).join('');
}
function setWatchFilter(f) { watchFilterVal=f; renderWatchlist(); }

// Dashboard
function renderDashboard() {
  const all=Object.values(decisions);
  const bew=all.filter(d=>d.status==='bewaard'), ink=all.filter(d=>d.status==='ingekocht');
  const tm=ink.reduce((s,d)=>s+(d.margin||0),0);
  const am=ink.length?Math.round(tm/ink.length):0;
  document.getElementById('statsGrid').innerHTML='<div class="stat-card"><div class="stat-value" style="color:var(--text-2)">'+(appData?.stats?.total_seen||all.length)+'</div><div class="stat-label">Beoordeeld</div></div><div class="stat-card"><div class="stat-value">'+bew.length+'</div><div class="stat-label">Op watchlist</div></div><div class="stat-card"><div class="stat-value" style="color:var(--green-text)">'+ink.length+'</div><div class="stat-label">Ingekocht</div></div><div class="stat-card"><div class="stat-value">'+(am?eur(am):'-')+'</div><div class="stat-label">Gem. marge</div></div>';
  if(appData?.models) {
    document.getElementById('modelStats').innerHTML=appData.models.map(m => {
      const mb=ink.filter(d=>d.model===m.model).length;
      const ms=bew.filter(d=>d.model===m.model).length;
      const avg=m.top.length?Math.round(m.top.reduce((s,a)=>s+a.quality_score,0)/m.top.length):0;
      return '<div class="model-card"><div class="model-row"><span class="model-name">'+m.model.replace('-Klasse','')+'</span><span class="model-stat">'+ms+' bewaard &middot; '+mb+' ingekocht</span></div><div class="model-bar-wrap"><div class="model-bar" style="width:'+avg+'%"></div></div><div style="font-size:11px;color:var(--text-3);margin-top:4px">Gem. score '+avg+' &middot; '+m.top.length+' in top</div></div>';
    }).join('');
  }
}

function renderAll() { renderToday(); renderWatchlist(); renderDashboard(); updateBadge(); }

async function loadData() {
  try { appData = await (await fetch('./data.json?t='+Date.now())).json(); } catch(e) { return; }
  renderAll();
}
loadData();
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
</body>
